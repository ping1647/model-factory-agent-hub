name: PQA Tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pqa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - run: pytest tests -q
