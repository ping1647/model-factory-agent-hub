name: Scheduled Batch Run

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduled-batch-run
  cancel-in-progress: false

jobs:
  scheduled-batch-run:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run test suite
        id: tests
        continue-on-error: true
        run: pytest tests -q

      - name: Run manual deterministic batch
        id: batch
        continue-on-error: true
        run: python scripts/run_manual_batch.py

      - name: Append batch health log
        if: ${{ always() }}
        run: >
          python scripts/append_batch_health_log.py
          --tests-status "${{ steps.tests.outcome }}"
          --batch-status "${{ steps.batch.outcome }}"

      # TODO: Follow-up PR: harden GitHub Pages refresh/deploy because GITHUB_TOKEN commits do not trigger Pages builds.
      - name: Commit generated artifacts
        if: ${{ always() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/runs data/dashboard/latest_dashboard_data.json app/dashboard/public/dashboard_data.json data/logs/batch_health_log.jsonl
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: persist scheduled batch outputs"
          git push origin HEAD:main

      - name: Fail if tests or batch failed
        if: ${{ steps.tests.outcome == 'failure' || steps.batch.outcome == 'failure' }}
        run: |
          echo "Tests outcome: ${{ steps.tests.outcome }}"
          echo "Batch outcome: ${{ steps.batch.outcome }}"
          exit 1
